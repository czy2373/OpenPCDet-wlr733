MAP_CLASS_TO_KITTI:
  'vehicle': 'Car'

DATASET: 'WLR733Dataset'
DATA_PATH: 'data/dair_i_kitti'
VERSION: 'v1.0'

# Aligned to a cleaner 0.2 m grid for PointPillar:
# x span = 99.2 -> 496 cells, y span = 80.0 -> 400 cells.
POINT_CLOUD_RANGE: [0, -40.0, -3.0, 99.2, 40.0, 1.0]
CLASS_NAMES: ['vehicle']

DATA_SPLIT: {
  'train': 'train',
  'test': 'val'
}

INFO_PATH: {
  'train': ['data/dair_i_kitti/dair_i_infos_train.pkl'],
  'test': ['data/dair_i_kitti/dair_i_infos_val.pkl']
}

IMAGE_ROOT: 'data/dair_i_kitti/image'
IMAGE_RESIZE_HW: [1080, 1920]
IMAGE_EXT: '.jpg'

GET_ITEM_LIST: ['points']
FOV_POINTS_ONLY: False

DATA_AUGMENTOR:
  DISABLE_AUG_LIST: ['placeholder']
  AUG_CONFIG_LIST: []

POINT_FEATURE_ENCODING:
  encoding_type: absolute_coordinates_encoding
  used_feature_list: ['x', 'y', 'z', 'intensity']
  src_feature_list: ['x', 'y', 'z', 'intensity']

DATA_PROCESSOR:
  - NAME: mask_points_and_boxes_outside_range
    REMOVE_OUTSIDE_BOXES: True
  - NAME: shuffle_points
    SHUFFLE_ENABLED: {
      'train': True,
      'test': False
    }
  - NAME: transform_points_to_voxels
    VOXEL_SIZE: [0.2, 0.2, 4]
    MAX_POINTS_PER_VOXEL: 32
    MAX_NUMBER_OF_VOXELS: {'train': 100000, 'test': 80000}
