    IMG_OUT_CHANNELS: 64
    IMG_DOWNSAMPLE: 4
    Z0: -2.0
    IMAGE_ROOT: /root/pointpillar/cam_matched
    IMAGE_RESIZE_HW:
    - 1080
    - 1920
    IMAGE_EXT: .jpg
  CLASS_NAMES:
  - vehicle
  VFE:
    NAME: PillarVFE
    WITH_DISTANCE: false
    USE_ABSLOTE_XYZ: true
    USE_NORM: true
    NUM_FILTERS:
    - 64
  IMAGE_BACKBONE:
    NAME: ImageBackboneSimple
    OUT_CH: 64
    OUT_CHANNELS: 64
    DOWNSAMPLE: 4
  IMAGE_TO_BEV:
    NAME: ImageToBEV
    VOXEL_SIZE:
    - 0.2
    - 0.2
    - 10
    Z0: -2.0
    Z_LIST:
    - -3.0
    - -2.5
    - -2.0
    POINT_CLOUD_RANGE:
    - -112
    - -106
    - -12
    - 99.2
    - 158
    - 2
    IMG_DOWNSAMPLE: 4
    BEV_DOWNSAMPLE: 4
