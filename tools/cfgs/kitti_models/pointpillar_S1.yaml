  BEV_FUSION:
    NAME: BEVFusion
    C_LIDAR: 64
    C_IMG: 64
    C_OUT: 64
    IMG_CHANNELS: 64
    ALPHA_INIT: 0.005
    GATE_TEMP: 1.0
    GATE_BIAS_INIT: 2.0
    DEBUG: true
    USE_PROJ: true
  ROI:
    FUSION:
      ENABLED: true
      MODE: polygon
      CORRIDOR:
        K: 1.53
        B: 18.5
        X0: -80.0
        X1: 90.0
        HALF_LEFT: 12.0
        HALF_RIGHT: 6.0
