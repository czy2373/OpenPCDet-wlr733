        B: 18.5
        X0: -80.0
        X1: 90.0
        HALF_LEFT: 9.0
        HALF_RIGHT: 3.5
      POLYGON:
      - - 11.1
        - 38.5
      - - 23.5
        - 32.3
      - - -20.3
        - -35.7
      - - -36.9
        - -29.5
